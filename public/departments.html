<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments - People Hub</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Inter', sans-serif;
    }
    .navbar {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
    }
    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .table-responsive {
      border-radius: 12px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <i class="bi bi-people-fill me-2 fs-3"></i>
        <span class="fw-bold">People Hub</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active fw-bold" href="departments.html">
              <i class="bi bi-building me-1"></i> Departments
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="employees.html">
              <i class="bi bi-person-badge me-1"></i> Employees
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="fw-bold text-dark">Departments Directory</h2>
        <p class="text-muted">Manage company organizational units.</p>
      </div>
      <button class="btn btn-primary d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#addDeptModal">
        <i class="bi bi-plus-lg me-2"></i> Add Department
      </button>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="card p-4">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="10%">ID</th>
                  <th width="50%">Department Name</th>
                  <th width="20%">Created At</th>
                  <th width="20%" class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="departmentsTableBody">
                <tr>
                  <td colspan="4" class="text-center py-4 text-muted">Loading departments...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Department Modal -->
  <div class="modal fade" id="addDeptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">Add New Department</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="addDeptForm">
          <div class="modal-body">
            <div class="mb-3">
              <label for="addDeptName" class="form-label">Department Name</label>
              <input type="text" class="form-control" id="addDeptName" required placeholder="e.g. Finance">
              <div class="invalid-feedback" id="addDeptFeedback"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Department</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Edit Department Modal -->
  <div class="modal fade" id="editDeptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">Edit Department</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="editDeptForm">
          <input type="hidden" id="editDeptId">
          <div class="modal-body">
            <div class="mb-3">
              <label for="editDeptName" class="form-label">Department Name</label>
              <input type="text" class="form-control" id="editDeptName" required>
              <div class="invalid-feedback" id="editDeptFeedback"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Update Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer mt-5 py-3 bg-light border-top text-center text-muted">
    <div class="container">
      <small>&copy; 2026 People Hub Administration. All rights reserved.</small>
    </div>
  </footer>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global Departments App Script -->
  <script src="js/departments.js"></script>
</body>
</html>
